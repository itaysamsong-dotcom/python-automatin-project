[pytest]
testpaths = src/tests
python_files = test_*.py
addopts =
    --browser chromium
    --base-url https://practicesoftwaretesting.com
    --tracing retain-on-failure
    --screenshot only-on-failure
    --output test-results
    --html=playwright-report/report.html
    --self-contained-html
    --alluredir=allure-results
    --clean-alluredir
    --retries 2
    --retry-delay 1
timeout = 30
markers =
    page_path(path): route opened by the page fixture
    product(name): product opened by the product-page fixtures
